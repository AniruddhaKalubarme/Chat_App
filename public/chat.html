<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chat App</title>
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body class="chat-page">
        <main class="chat-shell">
            <header class="chat-topbar">
                <div>
                    <p class="chat-kicker">Chat room</p>
                    <h1>Chat APP</h1>
                </div>
                <button id="sendLocation" class="secondary-button">Share location</button>
            </header>

            <section id="messages" class="message-feed" aria-live="polite"></section>

            <form id="msg-form" class="composer">
                <label for="ip">Enter the Text</label>
                <div class="composer-row">
                    <input type="text" id="ip" name="ip" placeholder="Write a message" autocomplete="off">
                    <button type="submit" id="msgSub" class="primary-button">Send</button>
                </div>
            </form>
        </main>

        <script id="message-template" type="text/html">
            <article class="message-card message-card--user{{#isOwn}} message-card--outgoing{{/isOwn}}">
                <div class="message-card__meta">
                    {{#user}}<span class="message-card__author">{{user}}</span>{{/user}}
                    <span class="message-card__time">{{createdAt}}</span>
                </div>
                <p class="message-card__text">{{message}}</p>
            </article>
        </script>

        <script id="location-template" type="text/html">
            <article class="message-card message-card--location{{#isOwn}} message-card--outgoing{{/isOwn}}">
                <div class="message-card__meta">
                    {{#user}}<span class="message-card__author">{{user}}</span>{{/user}}
                    <span class="message-card__time">{{createdAt}}</span>
                </div>
                <a class="location-link" href="{{location}}" target="_blank" rel="noopener noreferrer">Open shared location</a>
            </article>
        </script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/3.0.1/mustache.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.22.2/moment.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/qs/6.6.0/qs.min.js"></script>
        <script src="/socket.io/socket.io.js"></script>
        <script src="/js/chat.js"></script>
    </body>
</html>
