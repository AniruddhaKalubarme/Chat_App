<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chat App</title>
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body class="auth-page">
        <main class="auth-card">
            <p class="auth-eyebrow">Live room</p>
            <h1 class="auth-title">Join a room</h1>
            <p class="auth-copy">Pick a nickname and room to start chatting instantly.</p>

            <form action="./chat.html" class="auth-form">
                <div class="field">
                    <label for="userName">User Name</label>
                    <input type="text" name="userName" id="userName" placeholder="e.g. Alex" required>
                </div>

                <div class="field">
                    <label for="roomName">Room Name</label>
                    <input type="text" name="roomName" id="roomName" placeholder="e.g. design-team" required>
                </div>

                <button type="submit" id="joinBtn" class="primary-button">Join room</button>
            </form>
        </main>
    </body>
</html>
